name: Build RouteAnalyzer

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  build-linux:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux
        run: |
          pyinstaller \
            --onefile \
            --name RouteAnalyzer \
            --paths . \
            app/main.py

      - name: Upload Linux executable
        uses: actions/upload-artifact@v4
        with:
          name: RouteAnalyzer-Linux
          path: dist/RouteAnalyzer


  build-windows:

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows
        run: |
          pyinstaller --onefile --name RouteAnalyzer --paths . app/main.py

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: RouteAnalyzer-Windows
          path: dist/RouteAnalyzer.exe
